<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Rocket</title>
    <link rel="stylesheet" href="./css/rocket.css" />
    <link rel="stylesheet" href="./css/planet.css" />
    <link rel="stylesheet" href="./css/clouds.css" />
    <link rel="stylesheet" href="./css/moon.css" />
    <link rel="stylesheet" href="./css/stars.css" />
  </head>
  <body>
    <div class="rocket">
      <div class="rocket-fuselage">
        <div class="rocket-light1">
          <div class="rocket-light1__circle1"></div>
          <div class="rocket-light1__circle2"></div>
        </div>
        <div class="rocket-window">
          <div class="rocket-window__light1"></div>
          <div class="rocket-window__light2"></div>
        </div>
        <div class="rocket-tank__left">
          <div class="rocket-light2">
            <div class="rocket-light2__circle1"></div>
            <div class="rocket-light2__circle2"></div>
          </div>
        </div>
        <div class="rocket-tank__right">
          <div class="rocket-light2">
            <div class="rocket-light2__circle1"></div>
            <div class="rocket-light2__circle2"></div>
          </div>
        </div>
        <div class="rocket-booster__left"></div>
        <div class="rocket-booster__right"></div>
        <div class="rocket-minibooster__left"></div>
        <div class="rocket-minibooster__right"></div>
        <div class="rocket-wing__left"></div>
        <div class="rocket-wing__right"></div>
        <div class="rocket-engine">
          <div class="rocket-engine__merlin"></div>
          <div class="rocket-engine__merlin"></div>
          <div class="rocket-engine__merlin"></div>
          <div class="rocket-engine__merlin"></div>
          <div class="rocket-engine__merlin"></div>
          <div class="rocket-engine__merlin"></div>
          <div class="rocket-engine__merlin"></div>
        </div>
        <div class="rocket-fire">
          <div class="rocket-fire__flame1"></div>
          <div class="rocket-fire__flame2"></div>
          <div class="rocket-fire__flame3"></div>
          <div class="rocket-fire__flame4"></div>
          <div class="rocket-fire__flame5"></div>
          <div class="rocket-fire__flame6"></div>
          <div class="rocket-fire__flame7"></div>
          <div class="rocket-fire__flame8"></div>
        </div>
      </div>
    </div>
    <div class="planet">
      <div class="planet-shadown1">
        <div class="planet-shadown2">
          <div class="planet-shadown3">
            <div class="planet-surface">
              <div class="planet-crater1"></div>
              <div class="planet-crater2"></div>
              <div class="planet-crater3"></div>
              <div class="planet-crater4"></div>
              <div class="planet-crater5"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="cloud-left">
      <div class="cloud-left__bar1"></div>
      <div class="cloud-left__container">
        <div class="cloud-left__bar2"></div>
      </div>
      <div class="cloud-left__bar3"></div>
    </div>
    <div class="moon">
      <div class="moon-shadown1">
        <div class="moon-shadown2">
          <div class="moon-shadown3">
            <div class="moon-surface">
              <div class="moon-crater1"></div>
              <div class="moon-crater2"></div>
              <div class="moon-crater3"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="cloud-right">
      <div class="cloud-right__bar1"></div>
      <div class="cloud-right__container">
        <div class="cloud-right__bar2"></div>
      </div>
      <div class="cloud-right__bar3"></div>
    </div>
    <div class="stars">
      <div class="stars-group1">
        <div class="stars-group1__1"></div>
        <div class="stars-group1__2"></div>
        <div class="stars-group1__3"></div>
        <div class="stars-group1__4"></div>
      </div>
      <div class="stars-group2">
        <div class="stars-group2__1"></div>
        <div class="stars-group2__2"></div>
        <div class="stars-group2__3"></div>
        <div class="stars-group2__4"></div>
      </div>
      <div class="stars-group3">
        <div class="stars-group3__1"></div>
        <div class="stars-group3__2"></div>
        <div class="stars-group3__3"></div>
      </div>
      <div class="stars-group4">
        <div class="stars-group4__1"></div>
        <div class="stars-group4__2"></div>
      </div>
    </div>
  </body>
</html>
